# PAID searches — alert when price is at or below max_price
paid_wanted:
  - name: car_lift
    keywords:
      - 4 post lift
      - four post lift
      - 4-post lift
      - 2 post lift
      - two post lift
      - bridge jack
      - rolling bridge jack
      - car lift
      - auto lift
      - automotive lift
      - vehicle lift
      - garage lift
      - mid rise lift
    max_price_usd: 8000
    require_working: true
    refurb_ok: false
    priority: urgent
    notes: "4-post / 2-post lifts and bridge jacks — working only"

  - name: concrete mixer
    keywords:
      - concrete mixer
      - cement mixer
      - mortar mixer
      - portable mixer
      - drum mixer
    max_price_usd: 500
    require_working: true
    refurb_ok: false
    priority: urgent
    notes: "Farm buildout — must be working; no refurb/project machines"

  - name: hydraulic_jacking
    keywords:
      - hydraulic portable jacking system
      - portable jacking system
      - hydraulic jacking system
      - hydraulic leveling system
      - hydraulic leveling jacks
      - RV hydraulic jack
    max_price_usd: 5000
    require_working: true
    refurb_ok: false
    priority: urgent
    notes: "Portable hydraulic jacking / leveling — free or paid up to budget"

