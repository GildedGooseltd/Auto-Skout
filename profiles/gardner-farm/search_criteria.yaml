# Refurb / repair rules by item type
condition_rules:
  machinery:
    refurb_ok: false
    require_working: true
    applies_to:
      - mixer
      - tiller
      - tractor
      - mower
      - compressor
      - generator
      - saw
      - drill
      - tool
      - equipment
      - engine
      - motor
  furniture_antiques:
    refurb_ok: true
    require_working: false
    applies_to:
      - furniture
      - chair
      - desk
      - table
      - cabinet
      - antique
      - vintage
      - dresser
      - rolltop

