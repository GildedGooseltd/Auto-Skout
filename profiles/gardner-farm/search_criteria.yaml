# PAID searches — alert when price is at or below max_price
paid_wanted:
  - name: concrete mixer
    keywords:
      - concrete mixer
      - cement mixer
      - mortar mixer
    max_price_usd: 200
    require_working: true
    refurb_ok: false
    priority: urgent
    notes: "Farm buildout — must be working; no refurb/project machines"

  - name: hydraulic_jacking
    keywords:
      - hydraulic portable jacking system
      - portable jacking system
      - hydraulic jacking system
      - hydraulic leveling system
      - hydraulic leveling jacks
      - RV hydraulic jack
    max_price_usd: 5000
    require_working: true
    refurb_ok: false
    priority: urgent
    notes: "Portable hydraulic jacking / leveling — free or paid up to budget"

