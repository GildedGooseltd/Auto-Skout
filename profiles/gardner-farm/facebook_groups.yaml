# Facebook groups — Skout resolves IDs automatically (no manual URL pasting).
# 1) Login once:  .venv/bin/python src/scrapers/facebook.py --login
# 2) Discover:    .venv/bin/python src/scrapers/facebook.py --discover-groups
# Each scan refreshes the cache when stale (default 24h).

marketplace:
  location: "81040"
  search_terms:
    - free
    - garden
    - farm
    - hose
    - dirt
    - lumber
    - pallet
    - concrete mixer
    - plants
    - bricks
    - trailer
    - stereo system
    - outdoor speakers
    - radiant barrier
    - thermal radiant barrier
    - aluminum sheathing
    - thermal sheathing
    - heat resistant
    - hydraulic portable jacking system
    - portable jacking system
    - hydraulic jacking system

discovery:
  auto_all_joined: true
  cache_hours: 24
  include_keywords:
    - free
    - buy nothing
    - garden
    - farm
    - homestead
    - pueblo
    - walsenburg
    - colorado springs
    - la veta
    - cuchara
    - southern colorado
    - regenerative
    - local food
    - makers
  exclude_keywords:
    - onlyfans
    - crypto
    - dating
    - mlm

# match = text Skout uses to find the group in your joined list or FB search.
groups:
  - name: Colorado Local Food & Regenerative Ag Hub
    match: colorado local food regenerative ag
    url: https://www.facebook.com/groups/234744161268945
    region: statewide
    priority: high

