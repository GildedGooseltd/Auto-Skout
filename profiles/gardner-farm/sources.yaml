# Estate / yard sales — photos + listing text matched against farm/build keywords.
# Requires: playwright install chromium
estate_sales:
  enabled: true
  sites: [estatesales_net, estatesales_org, gsalr]
  require_keyword_match: true
  max_sales_per_city: 25
  max_detail_fetches: 50
  cities:
    - name: Pueblo
      url: https://www.estatesales.net/CO/Pueblo
    - name: Colorado Springs
      url: https://www.estatesales.net/CO/Colorado-Springs
    - name: Denver
      url: https://www.estatesales.net/CO/Denver
    - name: Canon City
      url: https://www.estatesales.net/CO/Canon-City
    - name: Littleton
      url: https://www.estatesales.net/CO/Littleton
  org_cities:
    - name: Pueblo
      url: https://www.estatesales.org/estate-sales/co/pueblo
    - name: Colorado Springs
      url: https://www.estatesales.org/estate-sales/co/colorado-springs
    - name: Denver
      url: https://www.estatesales.org/estate-sales/co/denver
  gsalr_cities:
    - name: Pueblo
      slug: pueblo-co
    - name: Colorado Springs
      slug: colorado-springs-co
    - name: Denver
      slug: denver-co
  match_keywords:
    - tool
    - tools
    - garden
    - farm
    - tractor
    - greenhouse
    - paint
    - lumber
    - plywood
    - freezer
    - fridge
    - refrigerator
    - concrete mixer
    - trencher
    - dirt
    - manure
    - topsoil
    - gravel
    - sand
    - fence
    - art
    - canvas
    - sewing
    - sewing machine
    - serger
    - embroidery
    - quilting
    - textile
    - fabric
    - craft room
    - ultrasonic

# Tier 2 — industrial sewing marketplaces (Playwright; Machinio/eBay may block bots)
textile_marketplaces:
  enabled: true
  zip: "81040"
  max_price_usd: 25000
  min_price_usd: 300
  sites: [machinio, ebay]
  search_terms:
    - industrial sewing machine
    - commercial sewing machine
    - ultrasonic sewing machine
    - sonobond seammaster
    - walking foot sewing
    - industrial serger

# Tier 2 — textile plant / govt surplus auctions
textile_auctions:
  enabled: true
  max_price_usd: 25000
  min_price_usd: 300
  sites: [hgp, govplanet, govdeals, irs]
  markets:
    - state: CO
      label: Colorado
  keywords:
    - industrial sewing
    - textile equipment
    - ultrasonic sewing
    - blindstitch
    - walking foot

# Tier 3 — dealer used inventory (Pleasant Street = Machinio dealer feed)
dealer_inventory:
  enabled: true
  max_price_usd: 25000
  min_price_usd: 300
  max_listings_per_site: 60
  sites: [pleasant_street, md_equipment, cutsew]

web_marketplaces_scrape:
  enabled: false
