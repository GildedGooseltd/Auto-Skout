# All enabled sources run together each scan — one combined feed, shared keywords/scoring.
# See docs/other-sources.md for setup (Facebook login, etc.)

craigslist:
  enabled: true
  regions:
    - slug: pueblo
      name: Pueblo
      priority: high
    - slug: cosprings
      name: Colorado Springs
      priority: high
    - slug: denver
      name: Denver
      priority: high
    - slug: eastco
      name: Eastern CO
      priority: low
    - slug: rockies
      name: High Rockies
      priority: low
  free_categories: [zip, fga]
  paid_categories: [fga, tla]
  search_queries:
    - ""
    - garden
    - farm
    - hose
    - dirt
    - lumber
    - pallet
    - fence
    - plant
    - brick
    - rock
    - trailer
    - stereo system
    - outdoor speakers
    - radiant barrier
